spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/javatest
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 50
        id:
          new_generator_mappings: true

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type.descriptor.sql: TRACE
        orm.jdbc.bind: TRACE

# ─── Spring Boot Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers
  health:
    circuitbreakers:
      enabled: true

# ─── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED        # COUNT_BASED or TIME_BASED
        slidingWindowSize: 100                # number of calls in the sliding window (for COUNT_BASED)
        minimumNumberOfCalls: 10              # minimum calls before calculating failure rate
        permittedNumberOfCallsInHalfOpenState: 10
        waitDurationInOpenState: 10s          # how long to keep the CB open before moving to HALF_OPEN
        failureRateThreshold: 50              # percentage of failures to trip the CB
        slowCallRateThreshold: 100            # percent of slow calls to consider as failure (optional)
        slowCallDurationThreshold: 2s         # threshold to mark a call as slow (Duration)
        eventConsumerBufferSize: 10
        recordExceptions:
          - java.io.IOException
          - org.springframework.dao.DataAccessException
          - java.sql.SQLException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$NotFound
    instances:
      backendA:
        baseConfig: default
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        failureRateThreshold: 40
        waitDurationInOpenState: 15s
        recordExceptions:
          - org.springframework.dao.DataAccessException
          - java.sql.SQLException
          - java.net.SocketTimeoutException
      databaseCalls:
        baseConfig: default
        slidingWindowType: TIME_BASED         # use a time window for DB calls
        slidingWindowSize: 60                 # 60 seconds when TIME_BASED
        minimumNumberOfCalls: 20
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
        recordExceptions:
          - org.springframework.dao.DataAccessException
          - java.sql.SQLException
          - java.net.SocketTimeoutException
  retry:
    instances:
      databaseCalls:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.dao.TransientDataAccessException
          - java.sql.SQLTransientException
        ignoreExceptions:
          - com.cleancoders.postgresqltranscations.exception.EmployeeNotFoundException
          - com.cleancoders.postgresqltranscations.exception.EmployeeConflictException
          - com.cleancoders.postgresqltranscations.exception.ServiceUnavailableException
